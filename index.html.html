from pathlib import Path

html = r'''<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>測地成果表｜手機填寫版</title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Arial, "Microsoft JhengHei", sans-serif;
  padding: 10px;
  margin: 0;
  background: #f5f5f5;
}

h2, h3 {
  text-align: center;
  margin: 8px 0;
}

.section {
  background: white;
  border: 1px solid #aaa;
  padding: 10px;
  margin-bottom: 10px;
}

label {
  display: block;
  margin-top: 6px;
  font-size: 14px;
}

input, textarea {
  width: 100%;
  margin-top: 3px;
  padding: 6px;
  text-align: center;
  font-size: 16px;
}

textarea {
  min-height: 60px;
  resize: vertical;
}

.left-input {
  text-align: left;
}

.right-input {
  text-align: right;
}

/* 照片格子：固定範圍 */
.photo-box {
  width: 100%;
  height: 230px;
  border: 1px dashed #777;
  background: #fafafa;
  margin-top: 6px;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* 關鍵：完整顯示、不裁剪、自動等比例縮放 */
.photo-box img {
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  object-fit: contain;
  display: block;
}

button {
  width: 100%;
  padding: 12px;
  font-size: 18px;
  margin-top: 10px;
}

.two-photo {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

@media (max-width: 600px) {
  .two-photo {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<h2>測地基準點成果表</h2>

<div class="section">
  <label>檔案編號</label><input id="fileNo">
</div>

<div class="section">
  <label>點名</label><input id="pointName">
  <label>標示號碼</label><input id="markNo">
  <label>標示種類</label><input id="markType">
</div>

<div class="section">
  <label>五萬分一圖號</label><input id="map50No">
  <label>二萬五千分一圖號</label><input id="map25No">
  <label>施測日期</label><input id="surveyDate">
</div>

<div class="section">
  <label>五萬分一圖名</label><input id="map50Name">
  <label>二萬五千分一圖名</label><input id="map25Name">
  <label>施測單位</label><input id="unit" value="101RGBHQ">
</div>

<div class="section">
  <label>經度</label><input id="lon">
  <label>緯度</label><input id="lat">
  <label>標高</label><input id="height">
  <label>橫坐標</label><input id="x">
  <label>縱坐標</label><input id="y">
</div>

<div class="section">
  <h3>方位基準點</h3>
  <label>方位角空白格 1</label><input id="az1">
  <label>方位角空白格 2</label><input id="az2">
  <label>方位角空白格 3</label><input id="az3">
  <label>方位角空白格 4</label><input id="az4">
  <label>決定方法 1</label><input id="method1">
  <label>決定方法 2</label><input id="method2">
</div>

<div class="section">
  <h3>點位略圖</h3>
  <input type="file" accept="image/*" onchange="previewImage(event, 'siteSketch')">
  <div class="photo-box"><img id="siteSketch"></div>
</div>

<div class="section">
  <h3>點位詳情</h3>
  <label>點位：</label>
  <textarea id="detailPoint" class="left-input"></textarea>
  <label>方位基準點：</label>
  <textarea id="detailBase" class="left-input"></textarea>

  <div class="two-photo">
    <div>
      <h3>S1 照片</h3>
      <input type="file" accept="image/*" onchange="previewImage(event, 's1Photo')">
      <div class="photo-box"><img id="s1Photo"></div>
    </div>
    <div>
      <h3>S2 照片</h3>
      <input type="file" accept="image/*" onchange="previewImage(event, 's2Photo')">
      <div class="photo-box"><img id="s2Photo"></div>
    </div>
  </div>
</div>

<div class="section">
  <h3>近照</h3>
  <input type="file" accept="image/*" onchange="previewImage(event, 'nearPhoto')">
  <div class="photo-box"><img id="nearPhoto"></div>
</div>

<div class="section">
  <h3>遠照</h3>
  <input type="file" accept="image/*" onchange="previewImage(event, 'farPhoto')">
  <div class="photo-box"><img id="farPhoto"></div>
</div>

<div class="section">
  <h3>測量方式數值欄</h3>
  <label>已知點閉塞導線空白格 1</label><input class="right-input">
  <label>已知點閉塞導線空白格 2</label><input class="right-input">
  <label>已知點閉塞導線空白格 3</label><input class="right-input">
  <label>已知點閉塞導線空白格 4</label><input class="right-input">
</div>

<div class="section">
  <h3>最底下六格</h3>
  <label>起測點名</label><input class="right-input">
  <label>點號</label><input class="right-input">
  <label>種類等級</label><input class="right-input">
  <label>閉塞點名</label><input class="right-input">
  <label>點號</label><input class="right-input">
  <label>種類等級</label><input class="right-input">
</div>

<button onclick="window.print()">預覽 / 列印 / 存 PDF</button>

<script>
function previewImage(event, imgId) {
  const file = event.target.files[0];
  if (!file) return;

  const img = document.getElementById(imgId);
  img.src = URL.createObjectURL(file);

  img.onload = function () {
    URL.revokeObjectURL(img.src);
  };
}
</script>

</body>
</html>
'''

path = Path('/mnt/data/測地成果表_手機填寫_照片自動等比例.html')
path.write_text(html, encoding='utf-8')
path.as_posix()
